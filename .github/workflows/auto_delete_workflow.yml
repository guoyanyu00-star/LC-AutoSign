name: JLC Auto Sign

on:
  schedule:
    - cron: '0 0 * * *'  # 北京时间 08:00

  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Random Delay (0-3600 seconds)
      run: sleep $((RANDOM % 3600))

    - name: Run Sign Script
      env:
        TOKEN_LIST: ${{ secrets.TOKEN_LIST }}
        SEND_KEY_LIST: ${{ secrets.SEND_KEY_LIST }}
      run: |
        python main.py
